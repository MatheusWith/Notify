services:
  nginx:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend/Dockerfile
    ports:
      - "80:80"
    environment:
      API_URL: ${API_URL}
      BACKEND_HOST: ${BACKEND_HOST}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
    depends_on:
      - backend
      - frontend
    networks:
      - notify-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend/Dockerfile
    environment:
      API_URL: ${API_URL}
    networks:
      - notify-network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - notify-network
    restart: unless-stopped
    stop_grace_period: 30s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notify
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - notify-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: notify
      RABBITMQ_DEFAULT_PASS: notify
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - notify-network
    restart: unless-stopped

  worker:
    build:
      context: ../worker
      dockerfile: ../deploy/worker/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - rabbitmq
    networks:
      - notify-network
    restart: unless-stopped
    stop_grace_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: notify-mailpit
    networks:
      - notify-network
    restart: unless-stopped

networks:
  notify-network:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
