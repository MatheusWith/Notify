spring:
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  datasource:
    url: jdbc:postgresql://localhost:5432/notify
    username: notify
    password: notify
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: notify
    password: notify
    listener:
      simple:
        prefetch: 1

password:
  pepper: ${PASSWORD_PEPPER:}

app:
  jwt:
    secret: YTFkMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMg==
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  newsletter:
    confirmation-token-expiration-hours: 24
  rabbitmq:
    exchange:
      newsletter: newsletter.direct
      dead-letter: newsletter.dlx
    queue:
      confirmation: newsletter.subscription.confirmation.queue
      confirmation-dlq: newsletter.subscription.confirmation.dlq
    routing-key:
      confirmation: newsletter.subscription.confirmation
