spring:
  mail:
    host: mailpit
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  datasource:
    url: jdbc:postgresql://postgres:5432/notify
    username: notify
    password: notify
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: notify
    password: notify
    listener:
      simple:
        prefetch: 1

password:
  pepper: ${PASSWORD_PEPPER:}

app:
  jwt:
    secret: ${JWT_SECRET:YTFkMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMmMzZDRlNWY2YTFiMg==}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  newsletter:
    confirmation-token-expiration-hours: 24
  rabbitmq:
    exchange:
      newsletter: newsletter.direct
      dead-letter: newsletter.dlx
    queue:
      confirmation: newsletter.subscription.confirmation.queue
      confirmation-dlq: newsletter.subscription.confirmation.dlq
    routing-key:
      confirmation: newsletter.subscription.confirmation
