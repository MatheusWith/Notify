name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Format + Lint + Test + Build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notify
          POSTGRES_USER: notify
          POSTGRES_PASSWORD: notify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - run: ./mvnw spotless:check
      - run: ./mvnw pmd:check
      - run: ./mvnw spotbugs:check
      - run: ./mvnw clean test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notify
          SPRING_DATASOURCE_USERNAME: notify
          SPRING_DATASOURCE_PASSWORD: notify
      - run: ./mvnw -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend:
    name: Frontend (Lint + Test + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-smoke:
    name: Docker Build + Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f deploy/docker-compose.yml build --parallel
      - run: docker compose -f deploy/docker-compose.yml up -d
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80/api/v1/health > /dev/null 2>&1; then
              echo "Services ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Services failed to start within 30s"
              docker compose -f deploy/docker-compose.yml logs
              exit 1
            fi
            sleep 1
          done
      - run: bash deploy/smoke-test.sh http://localhost:80
      - run: docker compose -f deploy/docker-compose.yml down -v
